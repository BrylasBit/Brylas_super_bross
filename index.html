<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brylas Super Bros Mobile</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            padding: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        #logo-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            opacity: 0.1;
            z-index: 1;
            font-size: 60px;
            font-weight: bold;
            color: rgba(0,0,0,0.3);
            text-shadow: 5px 5px 10px rgba(0,0,0,0.5);
        }
        #touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
        }
        #controls-left { width: 50%; height: 100%; position: relative; }
        #controls-right { width: 50%; height: 100%; position: relative; }
        .btn-visual {
            position: absolute;
            bottom: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 40px;
            pointer-events: none;
        }
        #visual-left { width: 80px; height: 80px; left: 20px; }
        #visual-right { width: 80px; height: 80px; left: 120px; }
        #visual-jump { width: 100px; height: 100px; right: 40px; bottom: 60px; background: rgba(0, 255, 0, 0.15); }
        .active { background: rgba(255, 255, 255, 0.4) !important; transform: scale(0.95); }
    </style>
</head>
<body>

<div id="ui">
    <span>SCORE: <span id="scoreVal" style="color:#0f0">0</span></span>
    <span>LIVES: <span id="livesVal">3</span></span>
</div>

<div id="logo-title">
    🛡️ BRYLAS SUPER BROS 🛡️
</div>

<canvas id="gameCanvas"></canvas>

<div id="touch-layer">
    <div id="controls-left">
        <div id="visual-left" class="btn-visual">◄</div>
        <div id="visual-right" class="btn-visual">►</div>
    </div>
    <div id="controls-right">
        <div id="visual-jump" class="btn-visual">●</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let gameRunning = true;
    let score = 0;
    let lives = 3;
    let cameraX = 0;

    const keys = { right: false, left: false, up: false };

    const GRAVITY = 0.6;
    const FRICTION = 0.8;
    const MOVE_ACCEL = 0.8;
    const MAX_SPEED = 6;
    const JUMP_FORCE = -14;
    const BOUNCE_FORCE = -8;

    class Player {
        constructor() {
            this.width = 35;
            this.height = 50;
            this.x = 100;
            this.y = 100;
            this.velX = 0;
            this.velY = 0;
            this.grounded = false;
            this.facingRight = true;
            this.hasJumpBoost = false;
            this.powerUpTimer = 0;
        }

        update() {
            if (keys.right) {
                if (this.velX < MAX_SPEED) this.velX += MOVE_ACCEL;
                this.facingRight = true;
            }
            if (keys.left) {
                if (this.velX > -MAX_SPEED) this.velX -= MOVE_ACCEL;
                this.facingRight = false;
            }

            this.velX *= FRICTION;

            if (keys.up && this.grounded) {
                let force = this.hasJumpBoost ? JUMP_FORCE * 1.3 : JUMP_FORCE;
                this.velY = force;
                this.grounded = false;
            }

            this.velY += GRAVITY;
            this.x += this.velX;
            this.y += this.velY;
            this.grounded = false;

            if (this.y > canvas.height + 200) die();

            if (this.hasJumpBoost) {
                this.powerUpTimer--;
                if (this.powerUpTimer <= 0) this.hasJumpBoost = false;
            }
        }

        draw() {
            const x = this.x - cameraX;
            const y = this.y;

            // BRYLAS CHARACTER - Biała skóra, czarne włosy, broda, czarna koszula, czerwony krawat
            
            // Tułów - czarna koszula
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x + 2, y + 20, 31, 20);
            
            // Krawat - czerwony
            ctx.fillStyle = '#CC0000';
            ctx.fillRect(x + 14, y + 20, 7, 12);
            
            // Spodnie - czarne
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(x + 3, y + 40, 10, 10);
            ctx.fillRect(x + 22, y + 40, 10, 10);
            
            // Buty
            ctx.fillStyle = '#333333';
            ctx.fillRect(x + 2, y + 49, 12, 3);
            ctx.fillRect(x + 21, y + 49, 12, 3);
            
            // Głowa - biała skóra
            ctx.fillStyle = '#F5DEB3';
            ctx.fillRect(x + 3, y, 29, 20);
            
            // Czarne włosy (górna część głowy)
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x + 1, y - 2, 33, 7);
            ctx.beginPath();
            ctx.arc(x + 10, y + 2, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 25, y + 2, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Czarna broda
            ctx.fillStyle = '#333333';
            ctx.beginPath();
            ctx.moveTo(x + 8, y + 15);
            ctx.lineTo(x + 12, y + 18);
            ctx.lineTo(x + 23, y + 18);
            ctx.lineTo(x + 27, y + 15);
            ctx.fill();
            
            // Oczy
            ctx.fillStyle = '#000000';
            let eyeOffset = this.facingRight ? 8 : 5;
            ctx.fillRect(x + eyeOffset, y + 8, 4, 4);
            ctx.fillRect(x + eyeOffset + 8, y + 8, 4, 4);
            
            // Power-up efekt
            if (this.hasJumpBoost) {
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.strokeRect(x - 2, y - 5, 39, 60);
            }
        }
    }

    class Platform {
        constructor(x, y, w, h, type = 'static', moveRange = 0) {
            this.x = x; this.y = y; this.width = w; this.height = h;
            this.type = type; this.startX = x; this.moveRange = moveRange;
            this.moveSpeed = 2; this.direction = 1;
        }
        update() {
            if (this.type === 'moving') {
                this.x += this.moveSpeed * this.direction;
                if (player.grounded && player.x + player.width > this.x && player.x < this.x + this.width && Math.abs((player.y + player.height) - this.y) < 5) {
                    player.x += this.moveSpeed * this.direction;
                }
                if (this.x > this.startX + this.moveRange || this.x < this.startX) this.direction *= -1;
            }
        }
        draw() {
            ctx.fillStyle = this.type === 'moving' ? '#888' : '#654321';
            ctx.fillRect(this.x - cameraX, this.y, this.width, this.height);
            ctx.fillStyle = this.type === 'moving' ? '#aaa' : '#228B22';
            ctx.fillRect(this.x - cameraX, this.y, this.width, 10);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(this.x - cameraX, this.y, this.width, this.height);
        }
    }

    class Enemy {
        constructor(x, y, range) {
            this.x = x; this.y = y; this.width = 32; this.height = 32;
            this.startX = x; this.range = range; this.speed = 1.5; this.direction = 1; this.alive = true;
        }
        update() {
            if (!this.alive) return;
            this.x += this.speed * this.direction;
            if (this.x > this.startX + this.range || this.x < this.startX) this.direction *= -1;
            if (rectIntersect(player.x, player.y, player.width, player.height, this.x, this.y, this.width, this.height)) {
                if (player.velY > 0 && player.y + player.height - player.velY < this.y + this.height * 0.7) {
                    this.alive = false; player.velY = BOUNCE_FORCE; score += 100; updateUI();
                } else die();
            }
        }
        draw() {
            if (!this.alive) return;
            ctx.fillStyle = '#555'; ctx.fillRect(this.x - cameraX, this.y, this.width, this.height);
            ctx.fillStyle = '#f00'; let off = this.direction === 1 ? 18 : 6; ctx.fillRect(this.x - cameraX + off, this.y + 8, 8, 4);
        }
    }

    class Coin {
        constructor(x, y) { this.x = x; this.y = y; this.width = 24; this.height = 24; this.collected = false; }
        update() {
            if (this.collected) return;
            if (rectIntersect(player.x, player.y, player.width, player.height, this.x, this.y, this.width, this.height)) {
                this.collected = true; score += 50; updateUI();
            }
        }
        draw() {
            if (this.collected) return;
            ctx.fillStyle = '#FFD700'; ctx.beginPath();
            ctx.arc((this.x + 12) - cameraX, (this.y + 12) + Math.sin(Date.now() / 200) * 3, 10, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#000'; ctx.font = "12px Arial"; ctx.fillText("B", (this.x + 8) - cameraX, (this.y + 16) + Math.sin(Date.now() / 200) * 3);
        }
    }

    class PowerUp {
        constructor(x, y) { this.x = x; this.y = y; this.width = 25; this.height = 25; this.collected = false; }
        update() {
            if (this.collected) return;
            if (rectIntersect(player.x, player.y, player.width, player.height, this.x, this.y, this.width, this.height)) {
                this.collected = true; player.hasJumpBoost = true; player.powerUpTimer = 600;
            }
        }
        draw() {
            if (this.collected) return;
            ctx.fillStyle = '#FFE66D'; ctx.beginPath(); ctx.moveTo(this.x + 12 - cameraX, this.y); ctx.lineTo(this.x + 24 - cameraX, this.y + 25); ctx.lineTo(this.x - cameraX, this.y + 25); ctx.fill();
            ctx.fillStyle = '#FF6B35'; ctx.fillRect(this.x + 8 - cameraX, this.y + 10, 8, 15);
        }
    }

    function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
        return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
    }

    let platforms = [], enemies = [], coins = [], powerups = [];
    let player;

    function initLevel() {
        score = 0; updateUI();
        player = new Player();
        cameraX = 0;

        platforms = [
            new Platform(0, 500, 1000, 200),
            new Platform(1200, 500, 800, 200),
            new Platform(2300, 500, 2000, 200),
            new Platform(400, 400, 150, 40),
            new Platform(600, 300, 150, 40),
            new Platform(850, 250, 60, 40),
            new Platform(1050, 400, 100, 20, 'moving', 150),
            new Platform(2050, 400, 100, 20, 'moving', 200),
            new Platform(3800, 300, 20, 200)
        ];

        enemies = [
            new Enemy(500, 468, 200), new Enemy(1300, 468, 300),
            new Enemy(2500, 468, 100), new Enemy(620, 268, 100)
        ];

        coins = [
            new Coin(450, 350), new Coin(650, 250), new Coin(865, 200),
            new Coin(1100, 350), new Coin(1150, 330), new Coin(1200, 350)
        ];

        powerups = [new PowerUp(865, 210)];
    }

    function update() {
        player.update();

        let target = player.x - canvas.width * 0.3;
        if (target < 0) target = 0;
        cameraX += (target - cameraX) * 0.1;

        player.grounded = false;
        platforms.forEach(p => {
            p.update();
            let dir = colCheck(player, p);
            if (dir === "b") { player.grounded = true; player.velY = 0; }
            else if (dir === "t") { player.velY *= -1; }
        });

        enemies.forEach(e => e.update());
        coins.forEach(c => c.update());
        powerups.forEach(p => p.update());

        if (player.x > 3800) { alert("YOU WIN!"); initLevel(); }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        platforms.forEach(p => p.draw());
        coins.forEach(c => c.draw());
        powerups.forEach(p => p.draw());
        enemies.forEach(e => e.draw());
        player.draw();
    }

    function loop() {
        update(); draw(); requestAnimationFrame(loop);
    }

    function colCheck(shapeA, shapeB) {
        let vX = (shapeA.x + (shapeA.width / 2)) - (shapeB.x + (shapeB.width / 2));
        let vY = (shapeA.y + (shapeA.height / 2)) - (shapeB.y + (shapeB.height / 2));
        let hWidths = (shapeA.width / 2) + (shapeB.width / 2);
        let hHeights = (shapeA.height / 2) + (shapeB.height / 2);
        let colDir = null;

        if (Math.abs(vX) < hWidths && Math.abs(vY) < hHeights) {
            let oX = hWidths - Math.abs(vX);
            let oY = hHeights - Math.abs(vY);
            if (oX >= oY) {
                if (vY > 0) { colDir = "t"; shapeA.y += oY; } else { colDir = "b"; shapeA.y -= oY; }
            } else {
                if (vX > 0) { colDir = "l"; shapeA.x += oX; shapeA.velX = 0; } else { colDir = "r"; shapeA.x -= oX; shapeA.velX = 0; }
            }
        }
        return colDir;
    }

    function die() {
        lives--; updateUI();
        if (lives > 0) {
            player.x = 100; player.y = 100; player.velX = 0; player.velY = 0; cameraX = 0;
        } else {
            alert("GAME OVER"); lives = 3; initLevel();
        }
    }

    function updateUI() {
        document.getElementById('scoreVal').innerText = score;
        document.getElementById('livesVal').innerText = lives;
    }

    const touchLayer = document.getElementById('touch-layer');
    const visualLeft = document.getElementById('visual-left');
    const visualRight = document.getElementById('visual-right');
    const visualJump = document.getElementById('visual-jump');

    function handleTouch(e) {
        e.preventDefault();

        keys.left = false;
        keys.right = false;
        keys.up = false;

        visualLeft.classList.remove('active');
        visualRight.classList.remove('active');
        visualJump.classList.remove('active');

        for (let i = 0; i < e.touches.length; i++) {
            const touch = e.touches[i];
            const w = window.innerWidth;
            const x = touch.clientX;

            if (x < w / 2) {
                if (x < w / 4) {
                    keys.left = true;
                    visualLeft.classList.add('active');
                } else {
                    keys.right = true;
                    visualRight.classList.add('active');
                }
            } else {
                keys.up = true;
                visualJump.classList.add('active');
            }
        }
    }

    touchLayer.addEventListener('touchstart', handleTouch, {passive: false});
    touchLayer.addEventListener('touchmove', handleTouch, {passive: false});
    touchLayer.addEventListener('touchend', handleTouch, {passive: false});

    document.addEventListener("keydown", function(e) {
        if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
        if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
        if (e.code === "ArrowUp" || e.code === "Space") keys.up = true;
    });
    document.addEventListener("keyup", function(e) {
        if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
        if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
        if (e.code === "ArrowUp" || e.code === "Space") keys.up = false;
    });

    initLevel();
    loop();
</script>
</body>
</html>
